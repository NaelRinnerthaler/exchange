<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇨🇭 Mon Année d'Échange aux USA 🇺🇸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .counters {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .counter-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .counter-card:hover {
            transform: translateY(-5px);
        }

        .counter-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .counter-number {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .counter-label {
            font-size: 1rem;
            opacity: 0.8;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            height: 20px;
            overflow: hidden;
            margin: 30px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            height: 100%;
            border-radius: 25px;
            transition: width 0.5s ease;
            box-shadow: 0 2px 10px rgba(79, 172, 254, 0.4);
        }

        .progress-text {
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .dates-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .date-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .counters {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .dates-info {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .counter-number {
                font-size: 2.5rem;
            }
        }

        .flag {
            font-size: 2rem;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇨🇭 Mon Année d'Échange 🇺🇸</h1>
        <p class="subtitle">Une aventure inoubliable aux États-Unis</p>
        
        <div class="counters">
            <div class="counter-card">
                <div class="counter-title">📅 Jours Passés</div>
                <div class="counter-number" id="daysPassed">0</div>
                <div class="counter-label">jours vécus</div>
            </div>
            
            <div class="counter-card">
                <div class="counter-title">⏰ Jours Restants</div>
                <div class="counter-number" id="daysRemaining">0</div>
                <div class="counter-label">jours à vivre</div>
            </div>
        </div>
        
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text">
            <span id="progressPercentage">0</span>% de l'échange complété
        </div>
        
        <div class="dates-info">
            <div class="date-item">
                <strong>🛫 Départ :</strong><br>
                16 août 2024
            </div>
            <div class="date-item">
                <strong>🛬 Retour :</strong><br>
                27 juin 2025
            </div>
        </div>
    </div>

    <script>
        function updateCounters() {
            // Dates de votre échange
            const startDate = new Date('2024-08-16');
            const endDate = new Date('2025-06-27');
            const today = new Date();
            
            // Calcul des jours
            const totalDays = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
            const daysPassed = Math.max(0, Math.ceil((today - startDate) / (1000 * 60 * 60 * 24)));
            const daysRemaining = Math.max(0, Math.ceil((endDate - today) / (1000 * 60 * 60 * 24)));
            
            // Mise à jour des compteurs
            document.getElementById('daysPassed').textContent = daysPassed;
            document.getElementById('daysRemaining').textContent = daysRemaining;
            
            // Calcul et mise à jour du pourcentage de progression
            const progressPercentage = Math.min(100, Math.max(0, Math.round((daysPassed / totalDays) * 100)));
            document.getElementById('progressPercentage').textContent = progressPercentage;
            document.getElementById('progressFill').style.width = progressPercentage + '%';
        }

        // Mise à jour initiale
        updateCounters();
        
        // Mise à jour toutes les heures
        setInterval(updateCounters, 3600000);
        
        // Mise à jour à minuit chaque jour
        const now = new Date();
        const millisUntilMidnight = (24 - now.getHours()) * 60 * 60 * 1000 - now.getMinutes() * 60 * 1000 - now.getSeconds() * 1000;
        setTimeout(function() {
            updateCounters();
            setInterval(updateCounters, 24 * 60 * 60 * 1000); // Ensuite toutes les 24h
        }, millisUntilMidnight);
    </script>
</body>
</html>
